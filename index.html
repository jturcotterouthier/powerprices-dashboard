<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>European Power Prices Dashboard</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0a0a1a;color:#e0e0e0;padding:12px}
.hdr{text-align:center;margin-bottom:12px}
.hdr h1{font-size:1.4em;color:#fff}
.hdr p{font-size:.8em;color:#888;margin-top:2px}
.ctrl{display:flex;gap:8px;align-items:center;justify-content:center;flex-wrap:wrap;margin-bottom:10px}
.ctrl label{font-size:.8em;color:#aaa}
.ctrl input,.ctrl select{background:#1a1a2e;color:#fff;border:1px solid #333;padding:4px 8px;border-radius:4px;font-size:.8em}
.ctrl button{background:#2a2a4e;color:#fff;border:1px solid #444;padding:4px 12px;border-radius:4px;cursor:pointer;font-size:.8em}
.ctrl button:hover{background:#3a3a6e}
.ctrl button.active{background:#4a6cf7;border-color:#4a6cf7}
.tabs{display:flex;gap:4px;justify-content:center;margin-bottom:10px}
.tab{padding:6px 16px;background:#1a1a2e;border:1px solid #333;border-radius:4px 4px 0 0;cursor:pointer;font-size:.8em;color:#aaa}
.tab.active{background:#2a2a4e;color:#fff;border-bottom-color:#2a2a4e}
.panel{display:none;background:#1a1a2e;border:1px solid #333;border-radius:0 4px 4px 4px;padding:12px}
.panel.active{display:block}
.stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-bottom:10px}
.stat{background:#1a1a2e;border:1px solid #333;border-radius:4px;padding:8px 16px;text-align:center;min-width:120px}
.stat .val{font-size:1.3em;font-weight:bold;color:#4a6cf7}
.stat .lbl{font-size:.7em;color:#888;margin-top:2px}
canvas{width:100%;background:#0d0d22;border-radius:4px}
.tbl{max-height:300px;overflow-y:auto;margin-top:8px}
table{width:100%;border-collapse:collapse;font-size:.75em}
th,td{padding:4px 8px;border:1px solid #333;text-align:right}
th{background:#2a2a4e;position:sticky;top:0}
td:first-child,th:first-child{text-align:left}
.footer{text-align:center;margin-top:10px;font-size:.7em;color:#666}
.footer a{color:#4a6cf7}
.neg{color:#ef4444}.pos{color:#22c55e}
.legend{display:flex;gap:12px;justify-content:center;margin:6px 0;font-size:.75em}
.legend span{display:flex;align-items:center;gap:4px}
.legend i{display:inline-block;width:20px;height:3px;border-radius:2px}
#status{font-size:.75em;color:#888;text-align:center;margin:4px 0}
.mkt-row{display:flex;gap:6px;align-items:center;justify-content:center;flex-wrap:wrap;margin-bottom:6px}
</style></head><body>
<div class="hdr"><h1>European Day-Ahead Power Prices</h1><p>EPEX Spot & Nord Pool | Source: Energy-Charts (Fraunhofer ISE) | CC BY 4.0</p></div>
<div class="mkt-row">
<label>Market:</label>
<select id="mktSel" onchange="switchMarket()">
<optgroup label="Western Europe">
<option value="DE-LU" selected>Germany/Luxembourg (DE-LU)</option>
<option value="FR">France (FR)</option>
<option value="NL">Netherlands (NL)</option>
<option value="BE">Belgium (BE)</option>
<option value="AT">Austria (AT)</option>
<option value="CH">Switzerland (CH)</option>
</optgroup>
<optgroup label="Nordics">
<option value="DK1">Denmark West (DK1)</option>
<option value="DK2">Denmark East (DK2)</option>
<option value="NO1">Norway South (NO1)</option>
<option value="NO2">Norway Central (NO2)</option>
<option value="SE1">Sweden North (SE1)</option>
<option value="SE2">Sweden Central (SE2)</option>
<option value="SE3">Sweden South (SE3)</option>
<option value="SE4">Sweden Malmö (SE4)</option>
<option value="FI">Finland (FI)</option>
</optgroup>
<optgroup label="Iberian">
<option value="ES">Spain (ES)</option>
<option value="PT">Portugal (PT)</option>
</optgroup>
<optgroup label="Italy">
<option value="IT-North">Italy North (IT-North)</option>
<option value="IT-South">Italy South (IT-South)</option>
</optgroup>
<optgroup label="Central/Eastern">
<option value="PL">Poland (PL)</option>
<option value="CZ">Czech Republic (CZ)</option>
<option value="HU">Hungary (HU)</option>
<option value="SK">Slovakia (SK)</option>
<option value="SI">Slovenia (SI)</option>
<option value="HR">Croatia (HR)</option>
<option value="RO">Romania (RO)</option>
<option value="BG">Bulgaria (BG)</option>
</optgroup>
<optgroup label="Baltics">
<option value="EE">Estonia (EE)</option>
<option value="LV">Latvia (LV)</option>
<option value="LT">Lithuania (LT)</option>
</optgroup>
<optgroup label="Other">
<option value="GR">Greece (GR)</option>
</optgroup>
</select>
</div>
<div class="ctrl">
<label>Highlight from: <input type="date" id="hlDate" value="2026-03-03"></label>
<button onclick="doRefresh()">Refresh Data</button>
<button onclick="loadRange(30)">1M</button>
<button onclick="loadRange(90)">3M</button>
<button onclick="loadRange(180)">6M</button>
<button onclick="loadRange(365)">1Y</button>
</div>
<div id="status"></div>
<div class="stats" id="statsRow"></div>
<div class="tabs">
<div class="tab active" onclick="showTab(0)">Daily Profiles</div>
<div class="tab" onclick="showTab(1)">Time Series</div>
<div class="tab" onclick="showTab(2)">Peak-to-Trough</div>
<div class="tab" onclick="showTab(3)">Heatmap</div>
</div>
<div class="panel active" id="p0"><div class="legend" id="leg0"></div><canvas id="c0" height="400"></canvas></div>
<div class="panel" id="p1"><canvas id="c1" height="350"></canvas></div>
<div class="panel" id="p2"><canvas id="c2" height="350"></canvas><div class="tbl" id="tbl2"></div></div>
<div class="panel" id="p3"><canvas id="c3" height="400"></canvas></div>
<div class="footer">Data: <a href="https://energy-charts.info">energy-charts.info</a> (Fraunhofer ISE) | Updates daily after EPEX auction ~12:45 CET</div>
<script>
var allPrices=[],startTs=0,interval=900,days={},dayKeys=[],activeTab=0,currentBzn="DE-LU";
function aMax(a){var m=-Infinity;for(var i=0;i<a.length;i++)if(a[i]!==null&&a[i]>m)m=a[i];return m}
function aMin(a){var m=Infinity;for(var i=0;i<a.length;i++)if(a[i]!==null&&a[i]<m)m=a[i];return m}
function aAvg(a){var s=0,c=0;for(var i=0;i<a.length;i++)if(a[i]!==null){s+=a[i];c++}return c?s/c:0}
function fmt(v){return v===null?"N/A":v.toFixed(2)}
function dateStr(ts){var d=new Date(ts*1000);return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0")}
function groupByDay(prices,st,intv){var g={};for(var i=0;i<prices.length;i++){var t=st+i*intv;var dk=dateStr(t);if(!g[dk])g[dk]={prices:[],date:dk};g[dk].prices.push(prices[i])}return g}
function updateStats(){var sr=document.getElementById("statsRow");sr.innerHTML="";if(!allPrices.length)return;var items=[["Latest",fmt(allPrices[allPrices.length-1]),"EUR/MWh"],["Average",fmt(aAvg(allPrices)),""],["Min",fmt(aMin(allPrices)),""],["Max",fmt(aMax(allPrices)),""],["Range",fmt(aMax(allPrices)-aMin(allPrices)),""]];items.forEach(function(it){var d=document.createElement("div");d.className="stat";var v=document.createElement("div");v.className="val";v.textContent=it[1];var l=document.createElement("div");l.className="lbl";l.textContent=it[0]+(it[2]?" ("+it[2]+")":"");d.appendChild(v);d.appendChild(l);sr.appendChild(d)})}
function showTab(n){activeTab=n;var tabs=document.querySelectorAll(".tab");var panels=document.querySelectorAll(".panel");for(var i=0;i<tabs.length;i++){tabs[i].className=i===n?"tab active":"tab";panels[i].className=i===n?"panel active":"panel"}draw()}
function clearCanvas(id,h){var c=document.getElementById(id);var r=c.getBoundingClientRect();c.width=r.width*2;c.height=(h||r.height)*2;var ctx=c.getContext("2d");ctx.scale(2,2);ctx.clearRect(0,0,r.width,h||r.height);return{ctx:ctx,w:r.width,h:h||r.height}}
function drawAxes(ctx,w,h,pad,yMin,yMax,xLabels){ctx.strokeStyle="#333";ctx.lineWidth=0.5;ctx.beginPath();ctx.moveTo(pad.l,pad.t);ctx.lineTo(pad.l,h-pad.b);ctx.lineTo(w-pad.r,h-pad.b);ctx.stroke();ctx.fillStyle="#888";ctx.font="9px sans-serif";var steps=6;for(var i=0;i<=steps;i++){var y=pad.t+i*(h-pad.t-pad.b)/steps;var val=yMax-(yMax-yMin)*i/steps;ctx.textAlign="right";ctx.fillText(Math.round(val),pad.l-4,y+3);ctx.strokeStyle="#222";ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(w-pad.r,y);ctx.stroke()}if(xLabels){ctx.textAlign="center";xLabels.forEach(function(lb){ctx.fillText(lb[0],lb[1],h-pad.b+12)})}}
function drawProfiles(){var r=clearCanvas("c0",400);var ctx=r.ctx,w=r.w,h=r.h;if(!dayKeys.length)return;var pad={t:20,r:20,b:40,l:50};var pW=w-pad.l-pad.r;var hlDate=document.getElementById("hlDate").value||"2026-03-03";var leg0=document.getElementById("leg0");leg0.innerHTML="";var sp1=document.createElement("span");sp1.innerHTML='<i style="background:rgba(74,108,247,0.5)"><\/i>Before '+hlDate;leg0.appendChild(sp1);var sp2=document.createElement("span");sp2.innerHTML='<i style="background:#ef4444"><\/i>From '+hlDate;leg0.appendChild(sp2);var allV=[];dayKeys.forEach(function(k){allV=allV.concat(days[k].prices)});var yMin=aMin(allV),yMax=aMax(allV);if(yMin===yMax){yMin-=10;yMax+=10}var ppd=days[dayKeys[0]].prices.length;var xLbls=[];for(var i=0;i<=4;i++){var hr=String(i*6).padStart(2,"0")+":00";xLbls.push([hr,pad.l+i*6/24*pW])}xLbls.push(["24:00",pad.l+pW]);drawAxes(ctx,w,h,pad,yMin,yMax,xLbls);ctx.lineWidth=1;dayKeys.forEach(function(dk){var ps=days[dk].prices;var isHl=dk>=hlDate;ctx.strokeStyle=isHl?"rgba(239,68,68,0.7)":"rgba(74,108,247,0.5)";ctx.beginPath();for(var i=0;i<ps.length;i++){if(ps[i]===null)continue;var x=pad.l+i/ps.length*pW;var y=pad.t+(1-(ps[i]-yMin)/(yMax-yMin))*(h-pad.t-pad.b);if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y)}ctx.stroke()});ctx.fillStyle="#888";ctx.textAlign="left";ctx.font="9px sans-serif";ctx.fillText("EUR/MWh",2,pad.t+10)}
function drawTimeSeries(){var r=clearCanvas("c1",350);var ctx=r.ctx,w=r.w,h=r.h;if(!allPrices.length)return;var pad={t:20,r:20,b:40,l:50};var pW=w-pad.l-pad.r;var yMin=aMin(allPrices),yMax=aMax(allPrices);if(yMin===yMax){yMin-=10;yMax+=10}var hlDate=document.getElementById("hlDate").value||"2026-03-03";var hlTs=new Date(hlDate).getTime()/1000;var n=allPrices.length;drawAxes(ctx,w,h,pad,yMin,yMax);ctx.lineWidth=1;var prevHl=false;ctx.beginPath();for(var i=0;i<n;i++){var t=startTs+i*interval;var isHl=t>=hlTs;var x=pad.l+i/n*pW;var y=pad.t+(1-(allPrices[i]-yMin)/(yMax-yMin))*(h-pad.t-pad.b);if(i===0||isHl!==prevHl){ctx.stroke();ctx.strokeStyle=isHl?"#ef4444":"rgba(74,108,247,0.8)";ctx.beginPath();ctx.moveTo(x,y)}else{ctx.lineTo(x,y)}prevHl=isHl}ctx.stroke();ctx.fillStyle="#888";ctx.font="9px sans-serif";ctx.textAlign="left";var step=Math.max(1,Math.floor(dayKeys.length/8));for(var i=0;i<dayKeys.length;i+=step){var dx=pad.l+(i/dayKeys.length)*pW;ctx.save();ctx.translate(dx,h-pad.b+10);ctx.rotate(-0.5);ctx.textAlign="left";ctx.fillText(dayKeys[i],0,0);ctx.restore()}}
function drawPeakTrough(){var r=clearCanvas("c2",300);var ctx=r.ctx,w=r.w,h=r.h;if(!dayKeys.length)return;var pad={t:20,r:20,b:40,l:50};var pW=w-pad.l-pad.r;var dS=dayKeys.map(function(k){var ps=days[k].prices;return{date:k,min:aMin(ps),max:aMax(ps),avg:aAvg(ps),spread:aMax(ps)-aMin(ps)}});var spreads=dS.map(function(s){return s.spread});var yMax=aMax(spreads)*1.1;if(yMax<10)yMax=10;drawAxes(ctx,w,h,pad,0,yMax,null);var bW=Math.max(2,pW/dS.length-2);var hlDate=document.getElementById("hlDate").value||"2026-03-03";for(var i=0;i<dS.length;i++){var s=dS[i];var x=pad.l+(i+0.5)/dS.length*pW-bW/2;var bH=(s.spread/yMax)*(h-pad.t-pad.b);var y=h-pad.b-bH;ctx.fillStyle=s.date>=hlDate?"rgba(239,68,68,0.7)":"rgba(74,108,247,0.6)";ctx.fillRect(x,y,bW,bH)}if(dS.length<31||1){ctx.fillStyle="#888";ctx.font="9px sans-serif";for(var i=0;i<dS.length;i+=Math.ceil(dS.length/15)){var s=dS[i];var x=pad.l+(i+0.5)/dS.length*pW;ctx.save();ctx.translate(x,h-pad.b+10);ctx.rotate(-0.5);ctx.textAlign="left";ctx.fillText(s.date.slice(5),0,0);ctx.restore()}}var tbl=document.getElementById("tbl2");while(tbl.firstChild)tbl.removeChild(tbl.firstChild);var table=document.createElement("table");var hdr=table.insertRow();["Date","Min","Max","Avg","Spread (Peak-Trough)"].forEach(function(t){var th=document.createElement("th");th.textContent=t;hdr.appendChild(th)});dS.slice().sort(function(a,b){return b.spread-a.spread}).forEach(function(s){var row=table.insertRow();row.insertCell().textContent=s.date;if(s.min<0){row.insertCell().textContent=fmt(s.min);row.cells[1].className="neg"}else{row.insertCell().textContent=fmt(s.min)}row.insertCell().textContent=fmt(s.max);row.insertCell().textContent=fmt(s.avg);var sc=row.insertCell();sc.textContent=fmt(s.spread);sc.className=s.spread>200?"neg":""});tbl.appendChild(table)}
function drawHeatmap(){var r=clearCanvas("c3",400);var ctx=r.ctx,w=r.w,h=r.h;if(!dayKeys.length)return;var pad={t:30,r:20,b:40,l:60};var pW=w-pad.l-pad.r;var pH=h-pad.t-pad.b;var nR=dayKeys.length;var validAllPrices=allPrices.filter(function(p){return p!==null});var pMn=aMin(validAllPrices),pMx=aMax(validAllPrices);var spd=Math.round(86400/interval);function hC(v){if(v<pMn){var t=(v-pMn)/(pMx-pMn);return"rgb("+Math.round(200-t*30)+","+Math.round(200-t*30)+",255)"}else{var t=(v-pMn)/(pMx-pMn);return"rgb("+Math.round(255-t*140)+","+Math.round(170-t*140)+","+Math.round(50)+")"}} ctx.fillStyle="#888";ctx.font="9px sans-serif";for(var i=0;i<24;i++){var x=pad.l+i/24*pW;ctx.textAlign="center";ctx.fillText(String(i).padStart(2,"0")+":00",x+pW/48,pad.t-8)}for(var d=0;d<nR;d++){var cH=pH/nR;for(var j=0;j<24;j++){var cW=pW/24;ctx.fillStyle=days[dayKeys[d]]&&days[dayKeys[d]].prices[j*spd/24|0]!==undefined?hC(days[dayKeys[d]].prices[j*spd/24|0]):"#222";ctx.fillRect(pad.l+j*cW,pad.t+d*cH,cW+1,cH+1)}}ctx.fillStyle="#888";ctx.textAlign="right";ctx.font="8px sans-serif";for(var i=0;i<nR;i+=Math.max(1,Math.ceil(nR/15))){var lY=pad.t+i*pH/nR+pH/nR/2;ctx.fillText(dayKeys[i],pad.l-4,lY+3)}var gW=100;var gX=w-pad.r-gW;var gY=pad.t;for(var i=0;i<gW;i++){ctx.fillStyle=hC(pMn+(pMx-pMn)*i/gW);ctx.fillRect(gX+i,gY,2,8)}ctx.fillStyle="#888";ctx.font="7px sans-serif";ctx.textAlign="left";ctx.fillText(Math.round(pMn),gX,gY+18);ctx.textAlign="right";ctx.fillText(Math.round(pMx)+" EUR/MWh",gX+gW,gY+18)}
function draw(){if(!allPrices.length)return;updateStats();if(activeTab===0)drawProfiles();else if(activeTab===1)drawTimeSeries();else if(activeTab===2)drawPeakTrough();else if(activeTab===3)drawHeatmap()}
function setStatus(msg){document.getElementById("status").textContent=msg}
function fetchAPI(sd,ed){setStatus("Fetching "+currentBzn+" data from Energy-Charts API...");var url="https://api.energy-charts.info/price?bzn="+currentBzn+"&start="+sd+"&end="+ed;fetch("https://corsproxy.io/?url="+encodeURIComponent(url)).then(function(r){if(!r.ok)throw new Error("HTTP "+r.status);return r.json()}).then(function(d){if(!d.unix_seconds||!d.price)throw new Error("Invalid response");allPrices=d.price;startTs=d.unix_seconds[0];interval=d.unix_seconds[1]-d.unix_seconds[0];days=groupByDay(allPrices,startTs,interval);dayKeys=Object.keys(days).sort();setStatus("Loaded "+allPrices.length+" points ("+dayKeys[0]+" to "+dayKeys[dayKeys.length-1]+") for "+currentBzn);draw();}).catch(function(e){setStatus("Fetch failed: "+e.message)});}
function doRefresh(){var e=new Date();e.setDate(e.getDate()+1);var s=new Date();s.setDate(s.getDate()-21);fetchAPI(s.toISOString().slice(0,10),e.toISOString().slice(0,10));}
function loadRange(n){var e=new Date();e.setDate(e.getDate()+1);var s=new Date();s.setDate(s.getDate()-n);fetchAPI(s.toISOString().slice(0,10),e.toISOString().slice(0,10));}
function switchMarket(){currentBzn=document.getElementById("mktSel").value;doRefresh()}
document.getElementById("hlDate").addEventListener("change",function(){draw()});
window.addEventListener("resize",function(){draw()});
// Auto-load 3 weeks of data on page load
doRefresh();
</script></body></html>
